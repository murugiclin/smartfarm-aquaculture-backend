server:
  port: 8081
  servlet:
    context-path: /api/v1/aquaculture
  compression:
    enabled: true
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 100
    connection-timeout: 20000

spring:
  application:
    name: aquaculture-service
  
  profiles:
    active: development
  
  datasource:
    url: jdbc:postgresql://localhost:5432/smartfarm_aquaculture
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  
  # Redis disabled for now
  # redis:
  #   host: ${REDIS_HOST:localhost}
  #   port: ${REDIS_PORT:6379}
  
  # Kafka disabled for now
  # kafka:
  #   bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=300s

# Management & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging
logging:
  level:
    com.smartfarm.aquaculture: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Custom Properties
aquaculture:
  monitoring:
    water-quality-check-interval: 300000 # 5 minutes
    feeding-schedule-check-interval: 60000 # 1 minute
    health-check-interval: 3600000 # 1 hour
  
  alerts:
    oxygen-threshold: 5.0 # mg/L
    ph-min: 6.5
    ph-max: 8.5
    temperature-min: 20.0 # Celsius
    temperature-max: 30.0 # Celsius
  
  performance:
    batch-size: 1000
    max-concurrent-requests: 500
    request-timeout: 30000
